[DEFAULT]
# MCP Server Configuration
# ===========================

# MCP Gateway Endpoint
# The HTTPS endpoint URL for the MCP gateway that routes requests to the IDP MCP server.
# Format: https://<gateway-domain>/mcp
mcp_endpoint=

# Cognito Client ID
# The OAuth 2.0 client ID for your Cognito application.
# Used for authentication with the MCP server.
mcp_client_id=

# Cognito Client Secret
# The OAuth 2.0 client secret for your Cognito application.
# Used to compute SECRET_HASH for Cognito authentication.
# SECURITY: Store this securely, never commit to version control.
mcp_client_secret=

# Cognito Token URL
# The OAuth 2.0 token endpoint for your Cognito user pool.
# Format: https://<cognito-domain>/oauth2/token
mcp_token_url=

# Cognito Username
# The username for Cognito user pool authentication.
# Used with ADMIN_USER_PASSWORD_AUTH flow.
mcp_username=

# Cognito Password
# The password for Cognito user pool authentication.
# SECURITY: Store this securely, never commit to version control.
mcp_password=

# Cognito User Pool ID
# The ID of your Cognito user pool.
# Format: <region>_<pool-id>
mcp_user_pool_id=

# Sample PDF Path
# Path to the PDF file to process in the example.
# Can be absolute or relative to the script directory.
sample_pdf_path=./sample-w2.pdf
